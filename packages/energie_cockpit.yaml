# ========================================================================
# 5. AUTOMATIONS
# ========================================================================

automation:

  # Warnung: Gesamt-Monatskosten > 15 EUR
  - id: ec_kosten_warnung
    alias: "EC Monatskosten-Warnung"
    description: "Push wenn Gesamt-Monatskosten 15 EUR ueberschreiten"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.ec_kosten_gesamt_monat
        above: 15
    condition:
      - condition: template
        value_template: >
          {% set last = state_attr('automation.ec_monatskosten_warnung', 'last_triggered') %}
          {{ last is none or (now() - last).days > 25 }}
    action:
      - service: notify.mobile_app_iphone_15_pro_max_von_oliver
        data:
          title: "Energie-Cockpit: Kostenwarnung"
          message: >
            Monatskosten: {{ states('sensor.ec_kosten_gesamt_monat') }} EUR
            ({{ states('sensor.ec_verbrauch_gesamt_monat') }} kWh).
            Beleuchtung: {{ states('sensor.ec_kosten_beleuchtung_monat') }} EUR |
            Studio: {{ states('sensor.ec_kosten_studio_monat') }} EUR |
            Haushalt: {{ states('sensor.ec_kosten_haushalt_monat') }} EUR
          data:
            push:
              sound: default
              interruption-level: active

  # Tarifwechsel pruefen: Ersparnis > 100 EUR/Jahr
  - id: ec_tarifwechsel_pruefen
    alias: "EC Tarifwechsel pruefen"
    description: "Push wenn Tarifwechsel-Ersparnis 100 EUR/Jahr ueberschreitet"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.ec_tarifvergleich_ersparnis
        above: 100
    condition:
      - condition: template
        value_template: >
          {% set last = state_attr('automation.ec_tarifwechsel_pruefen', 'last_triggered') %}
          {{ last is none or (now() - last).days > 30 }}
    action:
      - service: notify.mobile_app_iphone_15_pro_max_von_oliver
        data:
          title: "Energie-Cockpit: Tarifwechsel pruefen!"
          message: >
            Wechsel von {{ states('input_number.ec_alter_tarif') }} auf
            {{ states('input_number.ec_neuer_tarif') }} EUR/kWh spart ca.
            {{ states('sensor.ec_tarifvergleich_ersparnis') }} EUR/Jahr.
          data:
            push:
              sound: default
              interruption-level: time-sensitive