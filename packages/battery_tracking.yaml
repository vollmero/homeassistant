            {% set heat_hours = states('sensor.bat_ku_heizung_01_heizstunden_30d') | float(0) %}
            {% set heat_ratio = heat_hours / 720 %}
            {% set weight = 1.0 + heat_ratio %}
            {% set daily_drain = (100 / 365) * weight %}
            {% set estimated = input_level - (days * daily_drain) %}
            {{ [estimated | round(0), 0] | max }}
          {% endif %}
        attributes:
          confidence: >
            {% set updated_str = states('input_datetime.bat_ku_heizung_01_updated') %}
            {% if updated_str in ['unknown', 'unavailable', ''] %}keine
            {% else %}
              {% set days = ((now() - as_datetime(updated_str)).total_seconds() / 86400) | float(0) %}
              {% if days < 14 %}hoch{% elif days < 60 %}mittel{% else %}niedrig{% endif %}
            {% endif %}
          tage_seit_eingabe: >
            {% set updated_str = states('input_datetime.bat_ku_heizung_01_updated') %}
            {% if updated_str in ['unknown', 'unavailable', ''] %}—
            {% else %}{{ ((now() - as_datetime(updated_str)).total_seconds() / 86400) | round(0) }}{% endif %}
          heizstunden_30d: "{{ states('sensor.bat_ku_heizung_01_heizstunden_30d') | float(0) | round(1) }}"
          letzter_wechsel: "{{ states('input_datetime.bat_ku_heizung_01_replaced') }}"
          raum: Küche
          geraet: KU_Heizung_01
          kategorie: manuell

      # -- SZ Heizung 01 --
      - name: BAT – SZ Heizung 01 Geschätzt
        unique_id: bat_sz_heizung_01_estimated
        unit_of_measurement: "%"
        device_class: battery
        icon: >
          {% set level = this.state | float(50) %}
          {% if level <= 10 %}mdi:battery-10
          {% elif level <= 25 %}mdi:battery-20
          {% elif level <= 50 %}mdi:battery-50
          {% elif level <= 75 %}mdi:battery-70
          {% else %}mdi:battery
          {% endif %}
        state: >
          {% set input_level = states('input_number.bat_sz_heizung_01_level') | float(0) %}
          {% set updated_str = states('input_datetime.bat_sz_heizung_01_updated') %}
          {% if updated_str in ['unknown', 'unavailable', ''] %}
            {{ input_level }}
          {% else %}
            {% set updated = as_datetime(updated_str) %}
            {% set days = ((now() - updated).total_seconds() / 86400) | float(0) %}
            {% set heat_hours = states('sensor.bat_sz_heizung_01_heizstunden_30d') | float(0) %}
            {% set heat_ratio = heat_hours / 720 %}
            {% set weight = 1.0 + heat_ratio %}
            {% set daily_drain = (100 / 365) * weight %}
            {% set estimated = input_level - (days * daily_drain) %}
            {{ [estimated | round(0), 0] | max }}
          {% endif %}
        attributes:
