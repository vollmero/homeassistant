          heizstunden_30d: "{{ states('sensor.bat_sz_heizung_01_heizstunden_30d') | float(0) | round(1) }}"
          letzter_wechsel: "{{ states('input_datetime.bat_sz_heizung_01_replaced') }}"
          raum: Schlafzimmer
          geraet: SZ_Heizung_01
          kategorie: manuell

      # ========================================================================
      # Zusammenfassungs-Sensor: Anzahl kritischer Batterien
      # ========================================================================
      - name: ZS – Batterien Kritisch
        unique_id: zs_batterien_kritisch
        icon: mdi:battery-alert
        unit_of_measurement: ""
        state: >
          {% set threshold = 25 %}
          {% set auto = states.sensor
              | selectattr('attributes.device_class', 'defined')
              | selectattr('attributes.device_class', 'eq', 'battery')
              | rejectattr('entity_id', 'search', 'iphone|ipad|watch|sap_|kf4w')
              | selectattr('state', 'is_number')
              | list %}
          {% set auto_crit = auto | selectattr('state', 'lt', threshold | string) | list | count %}
          {% set manual_sensors = [
              'sensor.bat_az_heizung_01_geschatzt',
              'sensor.bat_bz_heizung_01_geschatzt',
              'sensor.bat_wz_heizung_01_geschatzt',
              'sensor.bat_wz_heizung_02_geschatzt',
              'sensor.bat_ki_heizung_01_geschatzt',
              'sensor.bat_ki_heizung_02_geschatzt',
              'sensor.bat_ku_heizung_01_geschatzt',
              'sensor.bat_sz_heizung_01_geschatzt'
            ] %}
          {% set ns = namespace(manual_crit=0) %}
          {% for s in manual_sensors %}
            {% if states(s) | float(100) < threshold %}
              {% set ns.manual_crit = ns.manual_crit + 1 %}
            {% endif %}
          {% endfor %}
          {{ auto_crit + ns.manual_crit }}


# ==============================================================================
# AUTOMATIONEN
# ==============================================================================

automation:

  # ============================================================================
  # 1) AUTO-ZEITSTEMPEL: Wenn Ladestand geändert wird → Datum aktualisieren
  # ============================================================================
  - id: bat_auto_timestamp
    alias: BAT – Auto-Zeitstempel bei Eingabe
    description: >
      Wenn ein Tado-Batteriestand per Input-Number geändert wird,
      wird automatisch der Zeitstempel der letzten Eingabe aktualisiert.
    trigger:
      - platform: state
        entity_id:
          - input_number.bat_az_heizung_01_level
          - input_number.bat_bz_heizung_01_level
          - input_number.bat_wz_heizung_01_level
          - input_number.bat_wz_heizung_02_level
          - input_number.bat_ki_heizung_01_level
          - input_number.bat_ki_heizung_02_level
          - input_number.bat_ku_heizung_01_level
          - input_number.bat_sz_heizung_01_level
    condition:
      # Nur wenn sich der Wert tatsächlich geändert hat (nicht bei HA-Neustart)
      - condition: template
        value_template: "{{ trigger.from_state.state != trigger.to_state.state }}"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: >
            {% set map = {
              'input_number.bat_az_heizung_01_level': 'input_datetime.bat_az_heizung_01_updated',
              'input_number.bat_bz_heizung_01_level': 'input_datetime.bat_bz_heizung_01_updated',
              'input_number.bat_wz_heizung_01_level': 'input_datetime.bat_wz_heizung_01_updated',
              'input_number.bat_wz_heizung_02_level': 'input_datetime.bat_wz_heizung_02_updated',
              'input_number.bat_ki_heizung_01_level': 'input_datetime.bat_ki_heizung_01_updated',
              'input_number.bat_ki_heizung_02_level': 'input_datetime.bat_ki_heizung_02_updated',
              'input_number.bat_ku_heizung_01_level': 'input_datetime.bat_ku_heizung_01_updated',
              'input_number.bat_sz_heizung_01_level': 'input_datetime.bat_sz_heizung_01_updated'
            } %}
            {{ map[trigger.entity_id] }}
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    mode: queued
    max: 8

  # ============================================================================
  # 2) ERINNERUNG: Confidence niedrig → Push "Bitte Tado App checken"
  #    Prüfung 1× täglich um 10:00 Uhr
  # ============================================================================
  - id: bat_reminder_low_confidence
    alias: BAT – Erinnerung Tado-Batterien prüfen
    description: >
      Tägliche Prüfung: Wenn ein Tado-Thermostat-Batteriestand seit
      mehr als 60 Tagen nicht aktualisiert wurde → Erinnerung per Push.
    trigger:
      - platform: time
        at: "10:00:00"
    condition:
      - condition: template
        value_template: >
          {% set sensors = [
              'sensor.bat_az_heizung_01_geschatzt',
              'sensor.bat_bz_heizung_01_geschatzt',
              'sensor.bat_wz_heizung_01_geschatzt',
              'sensor.bat_wz_heizung_02_geschatzt',
              'sensor.bat_ki_heizung_01_geschatzt',
              'sensor.bat_ki_heizung_02_geschatzt',
              'sensor.bat_ku_heizung_01_geschatzt',
              'sensor.bat_sz_heizung_01_geschatzt'
            ] %}
          {% set ns = namespace(found=false) %}
          {% for s in sensors %}
            {% if state_attr(s, 'confidence') == 'niedrig' %}
              {% set ns.found = true %}
            {% endif %}
          {% endfor %}
          {{ ns.found }}
    action:
      - service: notify.mobile_app_iphone_15_pro_max_von_oliver
        data:
          title: "🔋 Tado-Batterie Check"
          message: >
            {% set sensors = [
                'sensor.bat_az_heizung_01_geschatzt',
                'sensor.bat_bz_heizung_01_geschatzt',
                'sensor.bat_wz_heizung_01_geschatzt',
                'sensor.bat_wz_heizung_02_geschatzt',
                'sensor.bat_ki_heizung_01_geschatzt',
                'sensor.bat_ki_heizung_02_geschatzt',
                'sensor.bat_ku_heizung_01_geschatzt',
                'sensor.bat_sz_heizung_01_geschatzt'
              ] %}
            {% set ns = namespace(stale=[]) %}
            {% for s in sensors %}
              {% if state_attr(s, 'confidence') == 'niedrig' %}
                {% set ns.stale = ns.stale + [state_attr(s, 'geraet') ~ ' (' ~ state_attr(s, 'tage_seit_eingabe') ~ ' Tage)'] %}
              {% endif %}
            {% endfor %}
            Folgende Thermostate wurden seit >60 Tagen nicht aktualisiert:
            {{ ns.stale | join(', ') }}
            Bitte in der Tado-App den Batteriestand prüfen.
          data:
            tag: bat_reminder
            group: batterie
    mode: single

  # ============================================================================
  # 3) WARNUNG: Geschätzter Stand unter 15% → Wechsel einplanen
  # ============================================================================
  - id: bat_warning_low_level
    alias: BAT – Warnung Batterie niedrig (Tado)
    description: >
      Wenn ein geschätzter Tado-Batteriestand unter 15% fällt → Push-Warnung.
    trigger:
      - platform: numeric_state
        entity_id:
          - sensor.bat_az_heizung_01_geschatzt
          - sensor.bat_bz_heizung_01_geschatzt
          - sensor.bat_wz_heizung_01_geschatzt
          - sensor.bat_wz_heizung_02_geschatzt
          - sensor.bat_ki_heizung_01_geschatzt
          - sensor.bat_ki_heizung_02_geschatzt
          - sensor.bat_ku_heizung_01_geschatzt
          - sensor.bat_sz_heizung_01_geschatzt
        below: 15
    action:
      - service: notify.mobile_app_iphone_15_pro_max_von_oliver
        data:
          title: "⚠️ Tado-Batterie fast leer"
          message: >
            {{ state_attr(trigger.entity_id, 'geraet') }}
            ({{ state_attr(trigger.entity_id, 'raum') }}):
            Geschätzt nur noch {{ states(trigger.entity_id) }}%.
            Batteriewechsel bald einplanen!
          data:
            tag: "bat_low_{{ trigger.entity_id }}"
            group: batterie
    mode: queued
    max: 8

  # ============================================================================
  # 4) WARNUNG: Auto-Readout Batterie unter 15% (Kategorie A)
  # ============================================================================
  - id: bat_warning_auto_low
    alias: BAT – Warnung Batterie niedrig (Auto)
    description: >
      Wenn ein automatisch ausgelesener Batterie-Sensor unter 15% fällt.
    trigger:
      - platform: numeric_state
        entity_id:
          - sensor.az_fenster_01_batterie
          - sensor.eve_door_20ebn9901_batterie
          - sensor.ikea_of_sweden_parasoll_door_window_sensor_batterie
          - sensor.ikea_of_sweden_parasoll_door_window_sensor_batterie_2
          - sensor.ikea_of_sweden_parasoll_door_window_sensor_batterie_3
          - sensor.lumi_lumi_sensor_magnet_aq2_batterie
          - sensor.lumi_lumi_sensor_magnet_aq2_batterie_2
          - sensor.lumi_lumi_sensor_magnet_aq2_batterie_3
          - sensor.lumi_lumi_sensor_magnet_aq2_batterie_4
          - sensor.lumi_lumi_sensor_magnet_aq2_batterie_5
          - sensor.lumi_lumi_sensor_magnet_aq2_batterie_6
          - sensor.az_raumklima_01_batterie
          - sensor.lumi_lumi_weather_batterie
          - sensor.lumi_lumi_weather_batterie_3
          - sensor.lumi_lumi_weather_batterie_4
          - sensor.lumi_lumi_weather_batterie_5
          - sensor.lumi_lumi_weather_batterie_6
          - sensor.az_bewegung_batterie
          - sensor.flur_bewegungsmelder_batterie
          - sensor.ikea_of_sweden_vallhorn_wireless_motion_sensor_batterie
          - sensor.ikea_of_sweden_vallhorn_wireless_motion_sensor_batterie_2
          - sensor.dimmer_1_schlafzimmer_batterie
          - sensor.dimmer_2_schlafzimmer_batterie
          - sensor.dimmer_kinderzimmer_batterie
        below: 15
    action:
      - service: notify.mobile_app_iphone_15_pro_max_von_oliver
        data:
          title: "⚠️ Sensor-Batterie niedrig"
          message: >
            {{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }}:
            Nur noch {{ trigger.to_state.state }}%!
          data:
            tag: "bat_auto_{{ trigger.entity_id }}"
            group: batterie
    mode: queued
    max: 8