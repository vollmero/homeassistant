          {% set updated_str = states('input_datetime.bat_ki_heizung_02_updated') %}
          {% if updated_str in ['unknown', 'unavailable', ''] %}
            {{ input_level }}
          {% else %}
            {% set updated = as_datetime(updated_str) %}
            {% set days = ((now() - updated).total_seconds() / 86400) | float(0) %}
            {% set heat_hours = states('sensor.bat_ki_heizung_02_heizstunden_30d') | float(0) %}
            {% set heat_ratio = heat_hours / 720 %}
            {% set weight = 1.0 + heat_ratio %}
            {% set daily_drain = (100 / 365) * weight %}
            {% set estimated = input_level - (days * daily_drain) %}
            {{ [estimated | round(0), 0] | max }}
          {% endif %}
