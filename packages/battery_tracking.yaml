# ==============================================================================
# HISTORY STATS: Heizstunden pro TRV (letzte 30 Tage)
# → Basis für die heizaktivitätsgewichtete Batterie-Schätzung
# ==============================================================================

sensor:
  # HINWEIS: history_stats kann NICHT im template:-Block stehen,
  # sondern muss unter sensor: als Platform-Integration definiert werden.

  # -- AZ --
  - platform: history_stats
    name: BAT – AZ Heizung 01 Heizstunden 30d
    entity_id: climate.az_heizung_01
    state: "heating"
    type: time
    start: "{{ now() - timedelta(days=30) }}"
    end: "{{ now() }}"

  # -- BZ --
  - platform: history_stats
    name: BAT – BZ Heizung 01 Heizstunden 30d
    entity_id: climate.bz_heizung_01
