# ==============================================================================
# PACKAGE: Batterie-Tracking & Monitoring (ZS)
#
# Enthält:
# - Kategorie A: Automatisch ausgelesene Batterie-Sensoren (ZHA/Zigbee/IKEA)
#   → Werden direkt als sensor.*_batterie von HA bereitgestellt
# - Kategorie B: Manuelle Eingabe für Tado X TRVs (kein Auto-Readout via Matter)
#   → input_number für Ladestand, input_datetime für Zeitstempel
#   → Predictive Template-Sensoren mit heizaktivitätsgewichteter Schätzung
#   → history_stats für Heizstunden-Tracking
# - Automationen: Auto-Zeitstempel, Erinnerungen, Warnungen
# - Zusammenfassungs-Sensor für Dashboard
#
# Externe Abhängigkeiten:
# - climate.az_heizung_01
# - climate.bz_heizung_01
# - climate.wz_heizung_01 / climate.wz_heizung_02
# - climate.ki_heizung_01 / climate.ki_heizung_02
# - climate.ku_heizung_01 (= Heizung 01 in Küche)
# - climate.sz_heizung_01
#
# Batterie-Sensoren Kategorie A (automatisch, aus ZHA/Zigbee):
# - sensor.az_fenster_01_batterie (Aqara)
# - sensor.eve_door_20ebn9901_batterie (Eve, BZ)
# - sensor.ikea_of_sweden_parasoll_door_window_sensor_batterie (KU_01)
# - sensor.ikea_of_sweden_parasoll_door_window_sensor_batterie_2 (KU_02)
# - sensor.ikea_of_sweden_parasoll_door_window_sensor_batterie_3 (KU_03)
# - sensor.lumi_lumi_sensor_magnet_aq2_batterie (KI_01)
# - sensor.lumi_lumi_sensor_magnet_aq2_batterie_2 (KI_02)
# - sensor.lumi_lumi_sensor_magnet_aq2_batterie_3 (KU_04)
# - sensor.lumi_lumi_sensor_magnet_aq2_batterie_4 (SZ_01)
# - sensor.lumi_lumi_sensor_magnet_aq2_batterie_5 (WZ_01)
# - sensor.lumi_lumi_sensor_magnet_aq2_batterie_6 (WZ_02)
# - sensor.az_raumklima_01_batterie (Aqara)
# - sensor.lumi_lumi_weather_batterie (KU Raumklima)
# - sensor.lumi_lumi_weather_batterie_3 (BZ Raumklima)
# - sensor.lumi_lumi_weather_batterie_4 (KI Raumklima)
# - sensor.lumi_lumi_weather_batterie_5 (WZ Raumklima)
# - sensor.lumi_lumi_weather_batterie_6 (SZ Raumklima)
# - sensor.az_bewegung_batterie (Aqara Bewegungsmelder)
# - sensor.flur_bewegungsmelder_batterie (Aqara)
# - sensor.ikea_of_sweden_vallhorn_wireless_motion_sensor_batterie (KU)
# - sensor.ikea_of_sweden_vallhorn_wireless_motion_sensor_batterie_2 (BZ)
# - sensor.dimmer_1_schlafzimmer_batterie (SZ Dimmer 01)
# - sensor.dimmer_2_schlafzimmer_batterie (SZ Dimmer 02)
# - sensor.dimmer_kinderzimmer_batterie (KI Dimmer)
#
# EINBAU: In packages/ ablegen, HA Config prüfen + Neustart.
# ==============================================================================


# ==============================================================================
# KATEGORIE B: TADO X TRVs – MANUELLE BATTERIE-EINGABE
# ==============================================================================

# ------------------------------------------------------------------------------
# HELFER: Ladestand-Eingabe pro Thermostat
