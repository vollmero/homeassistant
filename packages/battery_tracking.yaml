# ==============================================================================
# TEMPLATE-SENSOREN: Geschätzte Batteriestände (Kategorie B)
#
# FORMEL:
#   heating_ratio = heizstunden_30d / (30 × 24)
#   weight_factor = 1.0 + (heating_ratio × 1.0)
#     → idle: factor 1.0, 50% Heizzeit: 1.5, Dauer-Heizen: 2.0
#   daily_drain  = (100 / 365) × weight_factor
#   estimated    = last_input - (tage_seit_eingabe × daily_drain)
#
# CONFIDENCE:
#   hoch    = letzte Eingabe < 14 Tage
#   mittel  = letzte Eingabe 14–60 Tage
#   niedrig = letzte Eingabe > 60 Tage
#   keine   = noch nie eingegeben (Datum = 0 / ungesetzt)
# ==============================================================================

template:
  - sensor:

      # ========================================================================
      # Macro: Wiederverwendbare Logik als Jinja2-Macro
      # (wird in jedem Sensor inline genutzt, da HA keine globalen Macros hat)
      # ========================================================================

      # -- AZ Heizung 01 --
      - name: BAT – AZ Heizung 01 Geschätzt
        unique_id: bat_az_heizung_01_estimated
        unit_of_measurement: "%"
        device_class: battery
        icon: >
          {% set level = this.state | float(50) %}
          {% if level <= 10 %}mdi:battery-10
          {% elif level <= 25 %}mdi:battery-20
          {% elif level <= 50 %}mdi:battery-50
          {% elif level <= 75 %}mdi:battery-70
          {% else %}mdi:battery
          {% endif %}
        state: >
          {% set input_level = states('input_number.bat_az_heizung_01_level') | float(0) %}
          {% set updated_str = states('input_datetime.bat_az_heizung_01_updated') %}
          {% if updated_str in ['unknown', 'unavailable', ''] %}
            {{ input_level }}
          {% else %}
            {% set updated = as_datetime(updated_str) %}
            {% set days = ((now() - updated).total_seconds() / 86400) | float(0) %}
            {% set heat_hours = states('sensor.bat_az_heizung_01_heizstunden_30d') | float(0) %}
            {% set heat_ratio = heat_hours / 720 %}
            {% set weight = 1.0 + heat_ratio %}
            {% set daily_drain = (100 / 365) * weight %}
            {% set estimated = input_level - (days * daily_drain) %}
            {{ [estimated | round(0), 0] | max }}
          {% endif %}
        attributes:
          confidence: >
            {% set updated_str = states('input_datetime.bat_az_heizung_01_updated') %}
            {% if updated_str in ['unknown', 'unavailable', ''] %}
              keine
            {% else %}
              {% set updated = as_datetime(updated_str) %}
              {% set days = ((now() - updated).total_seconds() / 86400) | float(0) %}
              {% if days < 14 %}hoch
              {% elif days < 60 %}mittel
              {% else %}niedrig
              {% endif %}
            {% endif %}
          tage_seit_eingabe: >
            {% set updated_str = states('input_datetime.bat_az_heizung_01_updated') %}
            {% if updated_str in ['unknown', 'unavailable', ''] %}
              —
            {% else %}
              {% set updated = as_datetime(updated_str) %}
              {{ ((now() - updated).total_seconds() / 86400) | round(0) }}
            {% endif %}
          heizstunden_30d: >
            {{ states('sensor.bat_az_heizung_01_heizstunden_30d') | float(0) | round(1) }}
          letzter_wechsel: >
            {{ states('input_datetime.bat_az_heizung_01_replaced') }}
          raum: Arbeitszimmer
          geraet: AZ_Heizung_01
          kategorie: manuell

      # -- BZ Heizung 01 --
      - name: BAT – BZ Heizung 01 Geschätzt
        unique_id: bat_bz_heizung_01_estimated
        unit_of_measurement: "%"
        device_class: battery
        icon: >
          {% set level = this.state | float(50) %}
